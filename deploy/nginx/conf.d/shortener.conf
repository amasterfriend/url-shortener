server {
  listen 80;
  server_name _;

  # health check
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # convert api
  location = /convert {
    access_log off;
    proxy_pass http://shortener-convert:8888;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # show short url
  location / {
    access_log /var/log/nginx/access.log shortener;
    proxy_pass http://shortener-show:8889;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
